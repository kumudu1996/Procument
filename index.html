<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8" />

  <!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZEO Wilgamuwa | Procurement Calculator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <header class="header-banner">
    <div class="container">
      <div class="d-flex align-items-center justify-content-between py-2">
        <div class="header-logos d-flex align-items-center">
            <img src="https://lh3.googleusercontent.com/d/1swXZebSbtD5y9FZLrn0wdcnqQYAhncYl" class="header-logo-img" alt="Gov" height="60">
            <img src="https://lh3.googleusercontent.com/d/1Ilf-EfFxkIlln0O8eVyY8mIqfwFbN6xd" class="header-logo-img ms-3" style="max-width:150px" alt="ZEO">
        </div>
        
        <div class="text-end text-white office-titles flex-grow-1">
          <h5 class="mb-0 fw-bold">කලාප අධ්‍යාපන කාර්යාලය - විල්ගමුව</h5>
          <p class="mb-0" style="font-size: 0.9rem;">Zonal Education Office - Wilgamuwa</p>
        </div>
      </div>
    </div>
  </header>

  <main class="container mt-4 mb-5">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="card main-card border-0 shadow-lg">
          <div class="card-header text-center py-3">
            <h5 class="mb-0 text-uppercase fw-bold">නඩත්තු ප්‍රසම්පාදන තොරතුරු පරීක්ෂාව</h5>
          </div>
          <div class="card-body p-4">
            
            <div class="mb-4">
              <label class="form-label fw-bold">Contracting Agency</label>
              <select id="agency" class="form-select form-select-lg">
                <option value="">-- Select Agency --</option>
                <option value="SDC">SDC</option>
                <option value="Other">Other</option>
              </select>
            </div>

            <div id="calculator-inputs" style="display: none;">
              <div id="dynamic-fields"></div>

              <div class="row mt-3">
                <div class="col-md-6 mb-3">
                  <label class="form-label fw-bold">Start Date</label>
                  <input type="date" id="startDate" class="form-control">
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label fw-bold">End Date</label>
                  <input type="date" id="endDate" class="form-control">
                </div>
              </div>

              <button id="calcBtn" class="btn btn-primary-custom w-100 mt-3 py-2 fw-bold text-uppercase">Check Details</button>
            </div>

            <div id="resultBox" class="mt-4 shadow-sm" style="display: none;">
              <div class="alert alert-success border-0 mb-0">
                <h6 class="fw-bold mb-3 border-bottom border-success pb-2">ගණනය කළ සාරාංශය (Summary):</h6>
                <table class="table table-sm table-borderless mb-0">
                  <tbody id="resultBody"></tbody>
                </table>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="./main.js"></script>
</body>
</html>
