<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEO Wilgamuwa - Procurement Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            /* Attendance System එකේ වගේම වර්ණ පාවිච්චි කර ඇත */
            --header-bg: #000000;
            --accent-blue: #1e3c72;
            --success-green: #28a745;
        }
        body { 
            background-color: #eef2f7; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        /* Header styling based on your screenshot */
        .header-banner {
            background-color: var(--header-bg);
            color: white;
            padding: 15px 0;
            border-bottom: 5px solid #ffcc00; /* Gold line often seen in govt sites */
        }
        .logo-box {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .logo-img { height: 65px; }
        .office-name {
            text-align: center;
            font-weight: bold;
            line-height: 1.2;
        }
        .card { 
            border-radius: 12px; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.1); 
            border: none;
            margin-top: -15px;
        }
        .section-title {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }
        .btn-check {
            background-color: var(--success-green);
            color: white;
            padding: 12px;
            font-weight: bold;
            width: 100%;
            border-radius: 8px;
            border: none;
            transition: 0.3s;
        }
        .btn-check:hover { background-color: #218838; opacity: 0.9; }
        .result-card {
            display: none;
            background: #fff;
            border-left: 6px solid var(--success-green);
            border-radius: 10px;
            padding: 20px;
        }
        .table-results th { color: #555; width: 60%; font-weight: 500; }
        .table-results td { font-weight: bold; color: #1e3c72; text-align: right; }
    </style>
</head>
<body>

    <header class="header-banner">
        <div class="container">
            <div class="logo-box">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/5b/Emblem_of_Sri_Lanka.png" class="logo-img" alt="SL Emblem">
                <div class="office-name">
                    <div style="font-size: 1.3rem;">කලාප අධ්‍යාපන කාර්යාලය - විල්ගමුව</div>
                    <div style="font-size: 1.1rem; font-weight: normal;">Zonal Education Office - Wilgamuwa</div>
                </div>
                <div style="background: #fff; padding: 5px; border-radius: 5px; color: #000; font-weight: bold; font-size: 12px;">
                    WILGAMUWA<br>LOGO
                </div>
            </div>
        </div>
    </header>

    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="card p-4">
                    <div class="section-title">නඩත්තු ප්‍රසම්පාදන ගණකය (Procurement Calculator)</div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold">Contracting Agency</label>
                        <select id="agency" class="form-select form-select-lg" onchange="toggleFields()">
                            <option value="">-- තෝරන්න --</option>
                            <option value="SDC">SDC</option>
                            <option value="Other">Other (කොන්ත්‍රාත්කරු)</option>
                        </select>
                    </div>

                    <div id="formContent" style="display:none;">
                        <div id="sdcGroup" style="display:none;">
                            <div class="mb-3">
                                <label class="form-label">BOQ Amount (LKR)</label>
                                <input type="number" id="sdc_boq" class="form-control" placeholder="0.00">
                            </div>
                        </div>

                        <div id="otherGroup" style="display:none;">
                            <div class="row">
                                <div class="col-md-12 mb-3">
                                    <label class="form-label">BOQ Amount (LKR)</label>
                                    <input type="number" id="other_boq" class="form-control" placeholder="0.00">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Without Prosum (LKR)</label>
                                    <input type="number" id="w_prosum" class="form-control" placeholder="0.00">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Prosum (LKR)</label>
                                    <input type="number" id="prosum" class="form-control" placeholder="0.00">
                                </div>
                                <div class="col-md-12 mb-3">
                                    <label class="form-label">Profit Rate (%)</label>
                                    <input type="number" id="rate" class="form-control" value="5">
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Start Date (වැඩ අරඹන දිනය)</label>
                                <input type="date" id="startDate" class="form-control">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">End Date (වැඩ නිමවන දිනය)</label>
                                <input type="date" id="endDate" class="form-control">
                            </div>
                        </div>

                        <button class="btn-check mt-3" onclick="doCalculation()">CHECK DETAILS</button>
                    </div>
                </div>

                <div id="resultArea" class="result-card mt-4 shadow-sm">
                    <h5 class="text-dark border-bottom pb-2 mb-3">ප්‍රසම්පාදන දත්ත සාරාංශය</h5>
                    <table class="table table-results table-borderless">
                        <tbody id="displayBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleFields() {
            const agency = document.getElementById('agency').value;
            document.getElementById('formContent').style.display = (agency !== "") ? 'block' : 'none';
            document.getElementById('sdcGroup').style.display = (agency === "SDC") ? 'block' : 'none';
            document.getElementById('otherGroup').style.display = (agency === "Other") ? 'block' : 'none';
            document.getElementById('resultArea').style.display = 'none';
        }

        function doCalculation() {
            const agency = document.getElementById('agency').value;
            const startVal = document.getElementById('startDate').value;
            const endVal = document.getElementById('endDate').value;

            if (!startVal || !endVal) { alert("කරුණාකර දිනයන් ඇතුළත් කරන්න."); return; }

            const start = new Date(startVal);
            const end = new Date(endVal);
            let contractAmt = 0;

            if (agency === 'SDC') {
                contractAmt = parseFloat(document.getElementById('sdc_boq').value) || 0;
            } else {
                const w_pro = parseFloat(document.getElementById('w_prosum').value) || 0;
                const pro = parseFloat(document.getElementById('prosum').value) || 0;
                const rate = parseFloat(document.getElementById('rate').value) || 0;
                contractAmt = ((w_pro * rate / 100) + w_pro + pro);
            }

            const fmtNum = (n) => "Rs. " + n.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
            const fmtDate = (d) => d.toISOString().split('T')[0];
            const addMonths = (d, m) => { let r = new Date(d); r.setMonth(r.getMonth() + m); return r; };

            const rows = [
                ["Contract Amount", fmtNum(contractAmt)],
                ["Start Date", fmtDate(start)],
                ["End Date", fmtDate(end)],
                ["Performance Security (5%)", fmtNum(contractAmt * 0.05)],
                ["Performance Security Valid Till", fmtDate(addMonths(end, 1))],
                ["Performance Security Submit On/Before", fmtDate(start)],
                ["Insurance Submit On/Before", fmtDate(start)],
                ["Contractor's All Risk Policy (150%)", fmtNum(contractAmt * 1.5)],
                ["All Risk Policy Valid Till", fmtDate(addMonths(end, 13))],
                ["Third Party Insurance (150%)", fmtNum(contractAmt * 1.5)],
                ["Third Party Insurance Valid Till", fmtDate(addMonths(end, 1))]
            ];

            let html = "";
            rows.forEach(r => {
                html += `<tr><th>${r[0]}</th><td>${r[1]}</td></tr>`;
            });

            document.getElementById('displayBody').innerHTML = html;
            document.getElementById('resultArea').style.display = 'block';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
